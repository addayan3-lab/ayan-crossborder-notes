<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-ppc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFFBFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-ppc)"/>
  <circle cx="1050" cy="100" r="150" fill="#FFEDD5" opacity="0.5"/>
  <circle cx="150" cy="580" r="170" fill="#FFF7ED" opacity="0.4"/>
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">PPC 广告学习路径</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif">从结构搭建到数据复盘</text>
  <!-- Tree structure -->
  <!-- Root -->
  <rect x="460" y="160" width="280" height="56" rx="16" fill="#D97706"/>
  <text x="600" y="197" text-anchor="middle" font-size="22" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">广告活动结构</text>
  <!-- Left branch -->
  <rect x="80" y="270" width="240" height="90" rx="16" fill="#FFFFFF" stroke="#FED7AA" stroke-width="2"/>
  <text x="200" y="305" text-anchor="middle" font-size="18" fill="#D97706" font-family="system-ui, -apple-system, sans-serif" font-weight="700">自动广告</text>
  <text x="200" y="335" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">宽泛匹配，发现新词</text>
  <!-- Middle branch -->
  <rect x="370" y="270" width="240" height="90" rx="16" fill="#FFFFFF" stroke="#FED7AA" stroke-width="2"/>
  <text x="490" y="305" text-anchor="middle" font-size="18" fill="#D97706" font-family="system-ui, -apple-system, sans-serif" font-weight="700">精准广告</text>
  <text x="490" y="335" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">核心词 + 长尾词</text>
  <!-- Right branch -->
  <rect x="660" y="270" width="240" height="90" rx="16" fill="#FFFFFF" stroke="#FED7AA" stroke-width="2"/>
  <text x="780" y="305" text-anchor="middle" font-size="18" fill="#D97706" font-family="system-ui, -apple-system, sans-serif" font-weight="700">词组/广泛</text>
  <text x="780" y="335" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">扩展流量入口</text>
  <!-- Connectors -->
  <path d="M530 216 L160 270" stroke="#D97706" stroke-width="2" fill="none"/>
  <path d="M530 216 L490 270" stroke="#D97706" stroke-width="2" fill="none"/>
  <path d="M670 216 L780 270" stroke="#D97706" stroke-width="2" fill="none"/>
  <!-- Bottom row -->
  <rect x="80" y="400" width="200" height="80" rx="14" fill="#EFF6FF" stroke="#CBD5E1"/>
  <text x="180" y="435" text-anchor="middle" font-size="16" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="700">搜索词报告</text>
  <text x="180" y="458" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, -apple-system, sans-serif">否词 + 拓词</text>
  <rect x="320" y="400" width="200" height="80" rx="14" fill="#EFF6FF" stroke="#CBD5E1"/>
  <text x="420" y="435" text-anchor="middle" font-size="16" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="700">ACOS 分析</text>
  <text x="420" y="458" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, -apple-system, sans-serif">ROI 评估</text>
  <rect x="560" y="400" width="200" height="80" rx="14" fill="#EFF6FF" stroke="#CBD5E1"/>
  <text x="660" y="435" text-anchor="middle" font-size="16" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="700">预算调整</text>
  <text x="660" y="458" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, -apple-system, sans-serif">旺季/淡季策略</text>
  <rect x="800" y="400" width="200" height="80" rx="14" fill="#EFF6FF" stroke="#CBD5E1"/>
  <text x="900" y="435" text-anchor="middle" font-size="16" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="700">周复盘</text>
  <text x="900" y="458" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, -apple-system, sans-serif">数据驱动优化</text>
</svg>
