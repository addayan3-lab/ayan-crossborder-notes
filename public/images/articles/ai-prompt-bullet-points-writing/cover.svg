<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-bp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#F8FAFF"/>
    </linearGradient>
    <linearGradient id="accent-bp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4338CA"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-bp)"/>
  <circle cx="150" cy="100" r="160" fill="#E0E7FF" opacity="0.5"/>
  <circle cx="1050" cy="550" r="180" fill="#EEF2FF" opacity="0.4"/>
  <!-- Title -->
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">AI 提示词写五点描述</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif">卖点 · 关键词 · 信任 · 转化</text>
  <!-- Left: Bullet points panel -->
  <rect x="80" y="155" width="320" height="36" rx="6" fill="#4338CA"/>
  <text x="240" y="179" text-anchor="middle" font-size="14" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700">五点描述结构</text>
  <rect x="80" y="195" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="105" y="220" font-size="13" fill="#0F172A" font-family="system-ui, sans-serif" font-weight="600">1. 核心卖点</text>
  <text x="220" y="220" font-size="12" fill="#475569" font-family="system-ui, sans-serif">功能 · 材质 · 性能</text>
  <rect x="80" y="240" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="105" y="265" font-size="13" fill="#0F172A" font-family="system-ui, sans-serif" font-weight="600">2. 使用场景</text>
  <text x="220" y="265" font-size="12" fill="#475569" font-family="system-ui, sans-serif">用户痛点 · 场景描述</text>
  <rect x="80" y="285" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="105" y="310" font-size="13" fill="#0F172A" font-family="system-ui, sans-serif" font-weight="600">3. 关键词布局</text>
  <text x="220" y="310" font-size="12" fill="#475569" font-family="system-ui, sans-serif">核心词 · 长尾词</text>
  <rect x="80" y="330" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="105" y="355" font-size="13" fill="#0F172A" font-family="system-ui, sans-serif" font-weight="600">4. 信任感表达</text>
  <text x="220" y="355" font-size="12" fill="#475569" font-family="system-ui, sans-serif">认证 · 承诺 · 保障</text>
  <rect x="80" y="375" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="105" y="400" font-size="13" fill="#0F172A" font-family="system-ui, sans-serif" font-weight="600">5. 转化引导</text>
  <text x="220" y="400" font-size="12" fill="#475569" font-family="system-ui, sans-serif">售后 · 教程 · 保修</text>
  <!-- Arrow -->
  <path d="M405 305 L460 305" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
  <polygon points="455,297 470,305 455,313" fill="#6366F1"/>
  <!-- Center: AI Prompt window -->
  <rect x="475" y="160" width="320" height="340" rx="14" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
  <rect x="475" y="160" width="320" height="40" rx="14" fill="#6366F1"/>
  <circle cx="495" cy="180" r="6" fill="#FCA5A5"/>
  <circle cx="515" cy="180" r="6" fill="#FCD34D"/>
  <circle cx="535" cy="180" r="6" fill="#6EE7B7"/>
  <text x="580" y="185" font-size="14" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">AI 五点生成中...</text>
  <text x="500" y="230" font-size="14" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">产品参数输入：</text>
  <text x="500" y="258" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✓ 产品名称 / 核心材质</text>
  <text x="500" y="286" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✓ 关键词列表</text>
  <text x="500" y="314" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✓ Review 痛点摘要</text>
  <text x="500" y="354" font-size="14" fill="#4338CA" font-family="system-ui, sans-serif" font-weight="700">AI 输出：</text>
  <text x="500" y="382" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✅ 结构化的五点草稿</text>
  <text x="500" y="410" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✅ 每点关键词布局建议</text>
  <text x="500" y="438" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✅ 违规表达警示</text>
  <text x="500" y="478" font-size="13" fill="#D97706" font-family="system-ui, sans-serif" font-weight="600">⚠ 禁止事项：不要无参数硬写</text>
  <!-- Right: result tags -->
  <rect x="830" y="180" width="290" height="56" rx="28" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="975" y="214" text-anchor="middle" font-size="16" fill="#16A34A" font-family="system-ui, sans-serif" font-weight="700">功能卖点清晰</text>
  <rect x="830" y="255" width="290" height="56" rx="28" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="975" y="289" text-anchor="middle" font-size="16" fill="#4338CA" font-family="system-ui, sans-serif" font-weight="700">关键词自然布局</text>
  <rect x="830" y="330" width="290" height="56" rx="28" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="975" y="364" text-anchor="middle" font-size="16" fill="#D97706" font-family="system-ui, sans-serif" font-weight="700">人工复核·润色</text>
  <rect x="830" y="405" width="290" height="56" rx="28" fill="#FFE4E6" stroke="#FB7185" stroke-width="1.5"/>
  <text x="975" y="439" text-anchor="middle" font-size="16" fill="#BE123C" font-family="system-ui, sans-serif" font-weight="700">避免夸大表达</text>
  <!-- Bottom CTA -->
  <rect x="300" y="560" width="600" height="50" rx="16" fill="url(#accent-bp)"/>
  <text x="600" y="592" text-anchor="middle" font-size="18" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">参数 + 关键词 + Review → 结构化五点</text>
</svg>
