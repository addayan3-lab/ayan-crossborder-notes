<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-spr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#F8FAFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-spr)"/>
  <circle cx="150" cy="80" r="150" fill="#E0E7FF" opacity="0.5"/>
  <circle cx="1080" cy="580" r="180" fill="#EEF2FF" opacity="0.4"/>
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">痛点反推选品</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif">差评痛点 → 高频问题 → 选品机会</text>
  <!-- Reverse flow diagram -->
  <rect x="80" y="170" width="220" height="120" rx="14" fill="#FFFFFF" stroke="#A5B4FC" stroke-width="2"/>
  <text x="190" y="210" text-anchor="middle" font-size="17" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">差评痛点采集</text>
  <text x="190" y="240" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">竞品差评 + Q&amp;A</text>
  <text x="190" y="265" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">高频问题聚合</text>
  <path d="M305 230 L355 230" stroke="#6366F1" stroke-width="2" stroke-linecap="round"/>
  <polygon points="350,225 360,230 350,235" fill="#6366F1"/>
  <rect x="365" y="170" width="220" height="120" rx="14" fill="#FFFFFF" stroke="#A5B4FC" stroke-width="2"/>
  <text x="475" y="205" text-anchor="middle" font-size="17" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">AI 结构化分析</text>
  <text x="475" y="235" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">痛点频次统计</text>
  <text x="475" y="260" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">分类归因排序</text>
  <path d="M590 230 L640 230" stroke="#6366F1" stroke-width="2" stroke-linecap="round"/>
  <polygon points="635,225 645,230 635,235" fill="#6366F1"/>
  <rect x="650" y="170" width="220" height="120" rx="14" fill="#6366F1"/>
  <text x="760" y="205" text-anchor="middle" font-size="17" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">选品机会反推</text>
  <text x="760" y="235" text-anchor="middle" font-size="14" fill="#E0E7FF" font-family="system-ui, -apple-system, sans-serif">差异化空间判断</text>
  <text x="760" y="260" text-anchor="middle" font-size="14" fill="#E0E7FF" font-family="system-ui, -apple-system, sans-serif">改进方向确定</text>
  <path d="M875 230 L925 230" stroke="#6366F1" stroke-width="2" stroke-linecap="round"/>
  <polygon points="920,225 930,230 920,235" fill="#6366F1"/>
  <rect x="935" y="170" width="185" height="120" rx="14" fill="#FFFFFF" stroke="#A5B4FC" stroke-width="2"/>
  <text x="1027" y="205" text-anchor="middle" font-size="17" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">产品改进</text>
  <text x="1027" y="235" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">Listing 优化</text>
  <text x="1027" y="260" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">定位调整</text>
  <!-- 3 key questions -->
  <rect x="80" y="330" width="320" height="100" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="120" y="365" font-size="16" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">Q1：这个痛点多少人遇到？</text>
  <text x="120" y="392" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">频次判断 → 市场规模估算</text>
  <text x="120" y="415" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">频次高 = 市场需求大</text>
  <rect x="440" y="330" width="320" height="100" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="480" y="365" font-size="16" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">Q2：现有竞品解决了吗？</text>
  <text x="480" y="392" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">竞品差评无改善 = 机会</text>
  <text x="480" y="415" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">竞品好评覆盖 = 门槛</text>
  <rect x="800" y="330" width="320" height="100" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="840" y="365" font-size="16" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">Q3：我能做得更好吗？</text>
  <text x="840" y="392" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">供应链能力判断</text>
  <text x="840" y="415" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">成本与差异化空间</text>
  <!-- Bottom -->
  <rect x="340" y="470" width="520" height="56" rx="16" fill="#4338CA"/>
  <text x="600" y="506" text-anchor="middle" font-size="20" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">痛点 → 问题 → 机会 → 行动</text>
</svg>