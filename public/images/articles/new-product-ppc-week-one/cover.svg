<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0f2440"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="barAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Chart bars - 7 days -->
  <g transform="translate(740, 180)">
    <text x="0" y="-10" fill="#5b8fc9" font-size="11" font-family="system-ui, sans-serif" letter-spacing="1">Day</text>
    <!-- Day labels -->
    <text x="12" y="228" fill="#4a6d8a" font-size="10" font-family="system-ui, sans-serif">1</text>
    <text x="62" y="228" fill="#4a6d8a" font-size="10" font-family="system-ui, sans-serif">2</text>
    <text x="112" y="228" fill="#4a6d8a" font-size="10" font-family="system-ui, sans-serif">3</text>
    <text x="162" y="228" fill="#4a6d8a" font-size="10" font-family="system-ui, sans-serif">4</text>
    <text x="212" y="228" fill="#4a6d8a" font-size="10" font-family="system-ui, sans-serif">5</text>
    <text x="262" y="228" fill="#4a6d8a" font-size="10" font-family="system-ui, sans-serif">6</text>
    <text x="312" y="228" fill="#4a6d8a" font-size="10" font-family="system-ui, sans-serif">7</text>
    <!-- Bars -->
    <rect x="10" y="140" width="30" height="70" rx="3" fill="url(#bar)"/>
    <rect x="60" y="110" width="30" height="100" rx="3" fill="url(#bar)"/>
    <rect x="110" y="90" width="30" height="120" rx="3" fill="url(#bar)"/>
    <rect x="160" y="60" width="30" height="150" rx="3" fill="url(#barAccent)"/>
    <rect x="210" y="75" width="30" height="135" rx="3" fill="url(#bar)"/>
    <rect x="260" y="50" width="30" height="160" rx="3" fill="url(#barAccent)"/>
    <rect x="310" y="30" width="30" height="180" rx="3" fill="url(#bar)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="60" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.15"/>
  <circle cx="80" cy="80" r="100" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.08"/>
  <circle cx="1120" cy="550" r="80" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.12"/>
  <circle cx="1120" cy="550" r="130" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.06"/>

  <!-- Tag chip -->
  <rect x="60" y="100" width="100" height="28" rx="14" fill="#3b82f6" opacity="0.15"/>
  <text x="110" y="118" fill="#60a5fa" font-size="12" font-family="system-ui, sans-serif" text-anchor="middle" letter-spacing="1">AMAZON PPC</text>

  <!-- Main title -->
  <text x="60" y="180" fill="#ffffff" font-size="38" font-family="system-ui, sans-serif" font-weight="700" letter-spacing="2">新品广告第一周</text>
  <text x="60" y="230" fill="#ffffff" font-size="38" font-family="system-ui, sans-serif" font-weight="700" letter-spacing="2">怎么开</text>

  <!-- Divider line -->
  <line x1="60" y1="260" x2="260" y2="260" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <!-- Subtitle -->
  <text x="60" y="300" fill="#94b8d9" font-size="18" font-family="system-ui, sans-serif" letter-spacing="3">预算 / 关键词 / 否词</text>

  <!-- Tagline -->
  <rect x="60" y="335" width="220" height="36" rx="18" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <text x="170" y="358" fill="#93bbfc" font-size="15" font-family="system-ui, sans-serif" text-anchor="middle" letter-spacing="2">先拿数据，再做判断</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)" opacity="0.6"/>

  <!-- Brand -->
  <text x="60" y="590" fill="#2a4a6a" font-size="12" font-family="system-ui, sans-serif" letter-spacing="2">阿岩 · 亚马逊运营笔记</text>
</svg>