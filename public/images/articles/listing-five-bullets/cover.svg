<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-l5b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#FAFAFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-l5b)"/>
  <circle cx="1050" cy="80" r="170" fill="#EDE9FE" opacity="0.5"/>
  <circle cx="150" cy="580" r="190" fill="#F5F3FF" opacity="0.4"/>
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">Listing 五点写法</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif">功能点·场景点·信任点·AI 辅助</text>
  <!-- 3 pillar model -->
  <rect x="80" y="170" width="320" height="180" rx="16" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="2"/>
  <circle cx="240" cy="200" r="20" fill="#7C3AED"/>
  <text x="240" y="207" text-anchor="middle" font-size="16" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">1</text>
  <text x="240" y="240" text-anchor="middle" font-size="20" fill="#6D28D9" font-family="system-ui, -apple-system, sans-serif" font-weight="700">功能点</text>
  <text x="240" y="268" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">材质·尺寸·规格·参数</text>
  <text x="240" y="292" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">解决用户基础信息需求</text>
  <text x="240" y="316" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">放在第 1 条</text>
  <rect x="440" y="170" width="320" height="180" rx="16" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="2"/>
  <circle cx="600" cy="200" r="20" fill="#7C3AED"/>
  <text x="600" y="207" text-anchor="middle" font-size="16" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">2</text>
  <text x="600" y="240" text-anchor="middle" font-size="20" fill="#6D28D9" font-family="system-ui, -apple-system, sans-serif" font-weight="700">场景点</text>
  <text x="600" y="268" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">使用场景·用户痛点·效果</text>
  <text x="600" y="292" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">帮用户想象使用体验</text>
  <text x="600" y="316" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">放在第 2-4 条</text>
  <rect x="800" y="170" width="320" height="180" rx="16" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="2"/>
  <circle cx="960" cy="200" r="20" fill="#7C3AED"/>
  <text x="960" y="207" text-anchor="middle" font-size="16" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">3</text>
  <text x="960" y="240" text-anchor="middle" font-size="20" fill="#6D28D9" font-family="system-ui, -apple-system, sans-serif" font-weight="700">信任点</text>
  <text x="960" y="268" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">认证·保修·售后·保障</text>
  <text x="960" y="292" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">降低购买决策门槛</text>
  <text x="960" y="316" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">放在第 5 条</text>
  <!-- Sequence indicator -->
  <path d="M400 260 L430 260" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <polygon points="425,255 435,260 425,265" fill="#94A3B8"/>
  <path d="M760 260 L790 260" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <polygon points="785,255 795,260 785,265" fill="#94A3B8"/>
  <!-- Formula area -->
  <rect x="80" y="385" width="1040" height="70" rx="14" fill="#EDE9FE"/>
  <text x="600" y="420" text-anchor="middle" font-size="17" fill="#6D28D9" font-family="system-ui, -apple-system, sans-serif" font-weight="700">AI 辅助流程：卖点采集 → 功能/场景/信任分类 → 排序 → 人工复核</text>
  <!-- Result -->
  <rect x="340" y="490" width="520" height="56" rx="16" fill="#7C3AED"/>
  <text x="600" y="526" text-anchor="middle" font-size="20" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">五点优化 → 提升转化率</text>
</svg>