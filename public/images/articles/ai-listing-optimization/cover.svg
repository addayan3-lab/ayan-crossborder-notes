<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-aiio" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0FDFA"/>
      <stop offset="1" stop-color="#F8FFFE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-aiio)"/>
  <circle cx="1050" cy="100" r="160" fill="#CCFBF1" opacity="0.5"/>
  <circle cx="150" cy="580" r="180" fill="#F0FDFA" opacity="0.4"/>
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">AI &amp; Listing 优化</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif">AI 辅助改写 + 人工复核 = 最佳效果</text>
  <!-- Side by side comparison -->
  <rect x="80" y="170" width="480" height="200" rx="16" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="2"/>
  <text x="140" y="210" font-size="20" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-weight="700">AI 改写前</text>
  <rect x="120" y="230" width="400" height="50" rx="10" fill="#F1F5F9"/>
  <text x="320" y="255" text-anchor="middle" font-size="14" fill="#64748B" font-family="system-ui, -apple-system, sans-serif">平铺卖点·缺少场景·数据堆砌</text>
  <text x="120" y="295" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">• 关键词堆砌，可读性差</text>
  <text x="120" y="318" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">• 卖点杂糅，用户抓不住重点</text>
  <text x="120" y="341" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">• 缺少场景感，转化率低</text>
  <rect x="600" y="170" width="520" height="200" rx="16" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2"/>
  <text x="660" y="210" font-size="20" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-weight="700">AI 改写后</text>
  <rect x="640" y="230" width="440" height="50" rx="10" fill="#DCFCE7"/>
  <text x="860" y="255" text-anchor="middle" font-size="14" fill="#16A34A" font-family="system-ui, -apple-system, sans-serif">功能点+场景点+信任点结构清晰</text>
  <text x="640" y="295" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">✓ 三段式结构：功能→场景→信任</text>
  <text x="640" y="318" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">✓ 用户场景语言 + 关键词自然融入</text>
  <text x="640" y="341" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">✓ 核心卖点突出 + 转化引导</text>
  <!-- Arrow -->
  <path d="M565 270 L590 270" stroke="#0D9488" stroke-width="3" stroke-linecap="round"/>
  <polygon points="585,263 597,270 585,277" fill="#0D9488"/>
  <text x="580" y="260" text-anchor="middle" font-size="13" fill="#0D9488" font-family="system-ui, -apple-system, sans-serif" font-weight="700">→</text>
  <!-- Flow: AI → Human Review → Launch -->
  <rect x="120" y="410" width="260" height="70" rx="14" fill="#0D9488"/>
  <text x="250" y="445" text-anchor="middle" font-size="17" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">AI 生成初稿</text>
  <text x="250" y="466" text-anchor="middle" font-size="13" fill="#CCFBF1" font-family="system-ui, -apple-system, sans-serif">结构化 Prompt</text>
  <path d="M385 445 L430 445" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <polygon points="425,440 435,445 425,450" fill="#94A3B8"/>
  <rect x="440" y="410" width="260" height="70" rx="14" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2"/>
  <text x="570" y="445" text-anchor="middle" font-size="17" fill="#0D9488" font-family="system-ui, -apple-system, sans-serif" font-weight="700">人工复核</text>
  <text x="570" y="466" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, -apple-system, sans-serif">产品经验校准</text>
  <path d="M705 445 L750 445" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <polygon points="745,440 755,445 745,450" fill="#94A3B8"/>
  <rect x="760" y="410" width="260" height="70" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="890" y="445" text-anchor="middle" font-size="17" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="700">上线测试</text>
  <text x="890" y="466" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, -apple-system, sans-serif">CVR 数据验证</text>
  <!-- Bottom note -->
  <rect x="340" y="515" width="520" height="40" rx="20" fill="#E2E8F0"/>
  <text x="600" y="541" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">AI 不会取代运营，但会用 AI 的运营正在取代不会用 AI 的运营</text>
</svg>