  <text x="220" y="240" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">SP / SB / SD 数据导出</text>
  <text x="220" y="265" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">搜索词·花费·转化</text>
  <path d="M365 230 L410 230" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <polygon points="405,225 415,230 405,235" fill="#94A3B8"/>
  <rect x="420" y="170" width="280" height="120" rx="16" fill="#D97706"/>
  <text x="560" y="210" text-anchor="middle" font-size="18" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">AI 初筛</text>
  <text x="560" y="240" text-anchor="middle" font-size="14" fill="#FFEDD5" font-family="system-ui, -apple-system, sans-serif">高花费低转化标红</text>
  <text x="560" y="265" text-anchor="middle" font-size="14" fill="#FFEDD5" font-family="system-ui, -apple-system, sans-serif">搜索词意图分类</text>
  <path d="M705 230 L750 230" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <polygon points="745,225 755,230 745,235" fill="#94A3B8"/>
  <rect x="760" y="170" width="280" height="120" rx="16" fill="#FFFFFF" stroke="#FED7AA" stroke-width="2"/>
  <text x="900" y="210" text-anchor="middle" font-size="18" fill="#D97706" font-family="system-ui, -apple-system, sans-serif" font-weight="700">优化动作</text>
  <text x="900" y="240" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">否词·加词·调价</text>
  <text x="900" y="265" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">预算重分配</text>
  <!-- Key metrics panel -->
  <text x="80" y="345" font-size="18" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="700">AI 快速诊断指标</text>
  <rect x="80" y="365" width="180" height="70" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="170" y="395" text-anchor="middle" font-size="16" fill="#D97706" font-family="system-ui, -apple-system, sans-serif" font-weight="700">ACOS</text>
  <text x="170" y="418" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, -apple-system, sans-serif">>35% 预警</text>
  <rect x="280" y="365" width="180" height="70" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="370" y="395" text-anchor="middle" font-size="16" fill="#D97706" font-family="system-ui, -apple-system, sans-serif" font-weight="700">CVR</text>
  <text x="370" y="418" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, -apple-system, sans-serif"><3% 需检查 Listing</text>
  <rect x="480" y="365" width="180" height="70" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="570" y="395" text-anchor="middle" font-size="16" fill="#D97706" font-family="system-ui, -apple-system, sans-serif" font-weight="700">CTR</text>
  <text x="570" y="418" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, -apple-system, sans-serif"><0.3% 检查主图</text>
  <rect x="680" y="365" width="180" height="70" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="770" y="395" text-anchor="middle" font-size="16" fill="#D97706" font-family="system-ui, -apple-system, sans-serif" font-weight="700">TACOS</text>
  <text x="770" y="418" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, -apple-system, sans-serif">>15% 依赖广告</text>
  <rect x="880" y="365" width="180" height="70" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="970" y="395" text-anchor="middle" font-size="16" fill="#D97706" font-family="system-ui, -apple-system, sans-serif" font-weight="700">花费分布</text>
  <text x="970" y="418" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, -apple-system, sans-serif">Top 10 占比</text>
  <!-- Output -->
  <rect x="290" y="470" width="620" height="56" rx="16" fill="#D97706"/>
  <text x="600" y="506" text-anchor="middle" font-size="18" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">AI 诊断 → 人工确认 → 执行动作 → 下周复查</text>
</svg>