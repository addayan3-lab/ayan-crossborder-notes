<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-aip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFFBFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-aip)"/>
  <circle cx="1050" cy="80" r="160" fill="#FFEDD5" opacity="0.5"/>
  <circle cx="150" cy="580" r="180" fill="#FFF7ED" opacity="0.4"/>
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">AI 广告报表复盘</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif">用 AI 快速诊断广告问题·生成优化动作</text>
  <!-- Flow: Report → AI Analysis → Actions -->
  <rect x="80" y="170" width="280" height="120" rx="16" fill="#FFFFFF" stroke="#FED7AA" stroke-width="2"/>
