<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-lr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF1F2"/>
      <stop offset="1" stop-color="#FFFAFA"/>
    </linearGradient>
    <linearGradient id="accent-lr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#BE123C"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-lr)"/>
  <circle cx="150" cy="100" r="160" fill="#FFE4E6" opacity="0.5"/>
  <circle cx="1050" cy="550" r="180" fill="#FFF1F2" opacity="0.4"/>
  <!-- Title -->
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">AI 提示词检查 Listing 风险</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif">夸大 · 绝对化 · 未证明 · 违规表达</text>
  <!-- Left: Listing text card -->
  <rect x="80" y="155" width="340" height="36" rx="6" fill="#BE123C"/>
  <text x="250" y="179" text-anchor="middle" font-size="14" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700">Listing 文案风险检查</text>
  <rect x="80" y="200" width="340" height="80" rx="8" fill="#FFFFFF" stroke="#FDA4AF" stroke-width="1.5"/>
  <text x="100" y="225" font-size="13" fill="#0F172A" font-family="system-ui, sans-serif" font-weight="600">标题：</text>
  <text x="100" y="248" font-size="12" fill="#475569" font-family="system-ui, sans-serif">"最畅销的防水平板"</text>
  <text x="100" y="268" font-size="12" fill="#EF4444" font-family="system-ui, sans-serif" font-weight="600">⚠ 绝对化用词：最</text>
  <rect x="80" y="290" width="340" height="80" rx="8" fill="#FFFFFF" stroke="#FDA4AF" stroke-width="1.5"/>
  <text x="100" y="315" font-size="13" fill="#0F172A" font-family="system-ui, sans-serif" font-weight="600">五点：</text>
  <text x="100" y="338" font-size="12" fill="#475569" font-family="system-ui, sans-serif">"医用级不锈钢材质"</text>
  <text x="100" y="358" font-size="12" fill="#EF4444" font-family="system-ui, sans-serif" font-weight="600">⚠ 未证明表述：医用级</text>
  <rect x="80" y="380" width="340" height="70" rx="8" fill="#FFFFFF" stroke="#FDA4AF" stroke-width="1.5"/>
  <text x="100" y="405" font-size="13" fill="#0F172A" font-family="system-ui, sans-serif" font-weight="600">A+：</text>
  <text x="100" y="428" font-size="12" fill="#475569" font-family="system-ui, sans-serif">"通过 FCC 认证"</text>
  <text x="100" y="448" font-size="12" fill="#EF4444" font-family="system-ui, sans-serif" font-weight="600">⚠ 虚假认证声明</text>
  <!-- Arrow -->
  <path d="M425 300 L480 300" stroke="#E11D48" stroke-width="3" stroke-linecap="round"/>
  <polygon points="475,292 490,300 475,308" fill="#E11D48"/>
  <!-- Center: AI risk check -->
  <rect x="495" y="160" width="300" height="340" rx="14" fill="#FFFFFF" stroke="#FB7185" stroke-width="2"/>
  <rect x="495" y="160" width="300" height="40" rx="14" fill="#E11D48"/>
  <text x="645" y="185" text-anchor="middle" font-size="15" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700">AI 风险扫描</text>
  <text x="520" y="230" font-size="14" fill="#BE123C" font-family="system-ui, sans-serif" font-weight="700">检测类别：</text>
  <text x="520" y="258" font-size="13" fill="#475569" font-family="system-ui, sans-serif">🔴 夸大表达：2 处</text>
  <text x="520" y="286" font-size="13" fill="#475569" font-family="system-ui, sans-serif">🔴 绝对化用词：4 处</text>
  <text x="520" y="314" font-size="13" fill="#475569" font-family="system-ui, sans-serif">🔴 未证明效果：3 处</text>
  <text x="520" y="342" font-size="13" fill="#475569" font-family="system-ui, sans-serif">🔴 可能违规：1 处</text>
  <text x="520" y="382" font-size="14" fill="#BE123C" font-family="system-ui, sans-serif" font-weight="700">修改建议：</text>
  <text x="520" y="410" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✅ "最畅销" → "高口碑"</text>
  <text x="520" y="438" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✅ "医用级" → "不锈钢"</text>
  <text x="520" y="466" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✅ 删除认证声明</text>
  <!-- Right: result badges -->
  <rect x="830" y="180" width="290" height="56" rx="28" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="975" y="214" text-anchor="middle" font-size="16" fill="#EF4444" font-family="system-ui, sans-serif" font-weight="700">夸大表达</text>
  <rect x="830" y="255" width="290" height="56" rx="28" fill="#FFE4E6" stroke="#FB7185" stroke-width="1.5"/>
  <text x="975" y="289" text-anchor="middle" font-size="16" fill="#BE123C" font-family="system-ui, sans-serif" font-weight="700">绝对化用词</text>
  <rect x="830" y="330" width="290" height="56" rx="28" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="975" y="364" text-anchor="middle" font-size="16" fill="#D97706" font-family="system-ui, sans-serif" font-weight="700">未证明表达</text>
  <rect x="830" y="405" width="290" height="56" rx="28" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="975" y="439" text-anchor="middle" font-size="16" fill="#9333EA" font-family="system-ui, sans-serif" font-weight="700">潜在违规</text>
  <!-- Bottom CTA -->
  <rect x="300" y="560" width="600" height="50" rx="16" fill="url(#accent-lr)"/>
  <text x="600" y="592" text-anchor="middle" font-size="18" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">Listing 文案 → AI 风险扫描 → 合规修改</text>
</svg>
