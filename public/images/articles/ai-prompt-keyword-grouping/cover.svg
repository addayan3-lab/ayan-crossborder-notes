<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-kg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0F9FF"/>
      <stop offset="1" stop-color="#FAFFFE"/>
    </linearGradient>
    <linearGradient id="accent-kg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0369A1"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-kg)"/>
  <circle cx="150" cy="100" r="160" fill="#E0F2FE" opacity="0.5"/>
  <circle cx="1050" cy="550" r="180" fill="#F0F9FF" opacity="0.4"/>
  <!-- Title -->
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">AI 提示词整理关键词分组</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif">核心词 · 长尾词 · 场景词 · 广告词</text>
  <!-- Left: keyword cloud -->
  <rect x="80" y="155" width="340" height="36" rx="6" fill="#0369A1"/>
  <text x="250" y="179" text-anchor="middle" font-size="14" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700">关键词输入池</text>
  <rect x="90" y="205" width="80" height="30" rx="15" fill="#E0F2FE" stroke="#38BDF8"/>
  <text x="130" y="225" text-anchor="middle" font-size="11" fill="#0369A1" font-family="system-ui, sans-serif">wireless</text>
  <rect x="180" y="205" width="90" height="30" rx="15" fill="#E0F2FE" stroke="#38BDF8"/>
  <text x="225" y="225" text-anchor="middle" font-size="11" fill="#0369A1" font-family="system-ui, sans-serif">bluetooth</text>
  <rect x="280" y="205" width="80" height="30" rx="15" fill="#E0F2FE" stroke="#38BDF8"/>
  <text x="320" y="225" text-anchor="middle" font-size="11" fill="#0369A1" font-family="system-ui, sans-serif">earbuds</text>
  <rect x="110" y="245" width="100" height="30" rx="15" fill="#E0F2FE" stroke="#38BDF8"/>
  <text x="160" y="265" text-anchor="middle" font-size="11" fill="#0369A1" font-family="system-ui, sans-serif">noise cancelling</text>
  <rect x="220" y="245" width="80" height="30" rx="15" fill="#E0F2FE" stroke="#38BDF8"/>
  <text x="260" y="265" text-anchor="middle" font-size="11" fill="#0369A1" font-family="system-ui, sans-serif">sport</text>
  <rect x="310" y="245" width="70" height="30" rx="15" fill="#E0F2FE" stroke="#38BDF8"/>
  <text x="345" y="265" text-anchor="middle" font-size="11" fill="#0369A1" font-family="system-ui, sans-serif">waterproof</text>
  <rect x="120" y="285" width="90" height="30" rx="15" fill="#E0F2FE" stroke="#38BDF8"/>
  <text x="165" y="305" text-anchor="middle" font-size="11" fill="#0369A1" font-family="system-ui, sans-serif">travel case</text>
  <rect x="220" y="285" width="100" height="30" rx="15" fill="#E0F2FE" stroke="#38BDF8"/>
  <text x="270" y="305" text-anchor="middle" font-size="11" fill="#0369A1" font-family="system-ui, sans-serif">gym earbuds</text>
  <rect x="130" y="325" width="110" height="30" rx="15" fill="#E0F2FE" stroke="#38BDF8"/>
  <text x="185" y="345" text-anchor="middle" font-size="11" fill="#0369A1" font-family="system-ui, sans-serif">long battery</text>
  <rect x="250" y="325" width="120" height="30" rx="15" fill="#E0F2FE" stroke="#38BDF8"/>
  <text x="310" y="345" text-anchor="middle" font-size="11" fill="#0369A1" font-family="system-ui, sans-serif">comfortable fit</text>
  <rect x="140" y="365" width="130" height="30" rx="15" fill="#E0F2FE" stroke="#38BDF8"/>
  <text x="205" y="385" text-anchor="middle" font-size="11" fill="#0369A1" font-family="system-ui, sans-serif">hands free calling</text>
  <!-- Arrow -->
  <path d="M425 300 L480 300" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round"/>
  <polygon points="475,292 490,300 475,308" fill="#0EA5E9"/>
  <!-- Center: AI grouping -->
  <rect x="495" y="160" width="300" height="340" rx="14" fill="#FFFFFF" stroke="#38BDF8" stroke-width="2"/>
  <rect x="495" y="160" width="300" height="40" rx="14" fill="#0369A1"/>
  <text x="645" y="185" text-anchor="middle" font-size="15" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700">AI 分组引擎</text>
  <text x="520" y="230" font-size="14" fill="#0369A1" font-family="system-ui, sans-serif" font-weight="700">分组维度：</text>
  <text x="520" y="258" font-size="13" fill="#475569" font-family="system-ui, sans-serif">📂 核心词 · 高搜索高相关</text>
  <text x="520" y="286" font-size="13" fill="#475569" font-family="system-ui, sans-serif">📂 长尾词 · 低竞争精准</text>
  <text x="520" y="314" font-size="13" fill="#475569" font-family="system-ui, sans-serif">📂 场景词 · 人群使用场景</text>
  <text x="520" y="342" font-size="13" fill="#475569" font-family="system-ui, sans-serif">📂 广告测试词 · 需观察</text>
  <text x="520" y="382" font-size="14" fill="#0369A1" font-family="system-ui, sans-serif" font-weight="700">输出结果：</text>
  <text x="520" y="410" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✅ 每组分词列表</text>
  <text x="520" y="438" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✅ 使用建议（标题/ST/广告）</text>
  <text x="520" y="466" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✅ 暂不使用词</text>
  <!-- Right: grouped folders -->
  <rect x="830" y="180" width="290" height="50" rx="10" fill="#E0F2FE" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="975" y="210" text-anchor="middle" font-size="15" fill="#0369A1" font-family="system-ui, sans-serif" font-weight="700">📁 核心词 · 6 个</text>
  <rect x="830" y="245" width="290" height="50" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="975" y="275" text-anchor="middle" font-size="15" fill="#059669" font-family="system-ui, sans-serif" font-weight="700">📁 长尾词 · 12 个</text>
  <rect x="830" y="310" width="290" height="50" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="975" y="340" text-anchor="middle" font-size="15" fill="#D97706" font-family="system-ui, sans-serif" font-weight="700">📁 场景词 · 8 个</text>
  <rect x="830" y="375" width="290" height="50" rx="10" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="975" y="405" text-anchor="middle" font-size="15" fill="#9333EA" font-family="system-ui, sans-serif" font-weight="700">📁 广告测试词 · 5 个</text>
  <rect x="830" y="440" width="290" height="36" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="975" y="464" text-anchor="middle" font-size="14" fill="#64748B" font-family="system-ui, sans-serif">📁 暂不使用 · 3 个</text>
  <!-- Bottom CTA -->
  <rect x="300" y="560" width="600" height="50" rx="16" fill="url(#accent-kg)"/>
  <text x="600" y="592" text-anchor="middle" font-size="18" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">关键词池 → AI 分组 → 各归其位</text>
</svg>
