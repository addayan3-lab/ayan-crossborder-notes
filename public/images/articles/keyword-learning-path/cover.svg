<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-kw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0F4FF"/>
      <stop offset="1" stop-color="#FAFBFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-kw)"/>
  <circle cx="100" cy="80" r="180" fill="#DBEAFE" opacity="0.5"/>
  <circle cx="1100" cy="550" r="200" fill="#EFF6FF" opacity="0.6"/>
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">关键词学习路径</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif">从挖掘到布局，建立关键词系统</text>
  <!-- Funnel: top wide → bottom narrow -->
  <polygon points="180,190 1020,190 880,370 320,370" fill="#DBEAFE" opacity="0.3" stroke="#2563EB" stroke-width="2"/>
  <polygon points="320,370 880,370 780,530 420,530" fill="#DBEAFE" opacity="0.15" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Funnel label boxes -->
  <rect x="230" y="210" width="200" height="50" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="330" y="243" text-anchor="middle" font-size="18" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="700">关键词池 · 300+</text>
  <rect x="500" y="210" width="200" height="50" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="600" y="243" text-anchor="middle" font-size="18" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="700">筛选分组 · 80+</text>
  <rect x="770" y="210" width="200" height="50" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="870" y="243" text-anchor="middle" font-size="18" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="700">核心关键词 · 30+</text>
  <!-- Bottom result -->
  <rect x="440" y="460" width="320" height="60" rx="16" fill="#2563EB"/>
  <text x="600" y="498" text-anchor="middle" font-size="22" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">Listing 关键词布局</text>
  <!-- Arrow down -->
  <path d="M600 430 L600 460" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <polygon points="590,452 600,466 610,452" fill="#2563EB"/>
  <!-- Flow arrows between funnel levels -->
  <path d="M430 235 L490 235" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <polygon points="485,230 495,235 485,240" fill="#94A3B8"/>
  <path d="M700 235 L760 235" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <polygon points="755,230 765,235 755,240" fill="#94A3B8"/>
  <!-- Bottom tags -->
  <rect x="80" y="550" width="130" height="36" rx="18" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="145" y="573" text-anchor="middle" font-size="14" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif">关联 ASIN 拓词</text>
  <rect x="230" y="550" width="130" height="36" rx="18" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="295" y="573" text-anchor="middle" font-size="14" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif">搜索词报告</text>
  <rect x="380" y="550" width="130" height="36" rx="18" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="445" y="573" text-anchor="middle" font-size="14" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif">ABA 品牌分析</text>
  <rect x="530" y="550" width="130" height="36" rx="18" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="595" y="573" text-anchor="middle" font-size="14" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif">反向 ASIN 查词</text>
</svg>
