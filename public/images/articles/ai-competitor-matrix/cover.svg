  <rect x="80" y="400" width="1040" height="60" rx="14" fill="#E0E7FF"/>
  <text x="600" y="432" text-anchor="middle" font-size="16" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">AI 辅助：批量采集竞品数据 → 自动填充矩阵 → 人工判断差异化和机会点</text>
  <!-- Action -->
  <rect x="340" y="490" width="520" height="56" rx="16" fill="#4338CA"/>
  <text x="600" y="526" text-anchor="middle" font-size="20" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">矩阵拆解 → 差异化定位 → Listing 优化</text>
