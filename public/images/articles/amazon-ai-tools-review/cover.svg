<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-aiat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F1F5F9"/>
      <stop offset="1" stop-color="#FAFBFC"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-aiat)"/>
  <circle cx="1050" cy="100" r="160" fill="#E2E8F0" opacity="0.5"/>
  <circle cx="150" cy="580" r="180" fill="#F1F5F9" opacity="0.4"/>
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">亚马逊 AI 工具评测</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif">4 判断标准 + 6 类适合场景 + 5 类不适合</text>
  <!-- Evaluation criteria cards -->
  <text x="80" y="170" font-size="18" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="700">四大判断标准</text>
  <rect x="80" y="190" width="240" height="80" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="200" y="222" text-anchor="middle" font-size="16" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-weight="700">数据准确度</text>
  <text x="200" y="248" text-anchor="middle" font-size="13" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif">输出是否可靠</text>
  <rect x="340" y="190" width="240" height="80" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="460" y="222" text-anchor="middle" font-size="16" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-weight="700">场景匹配度</text>
  <text x="460" y="248" text-anchor="middle" font-size="13" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif">是否适合你的品</text>
  <rect x="600" y="190" width="240" height="80" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="720" y="222" text-anchor="middle" font-size="16" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-weight="700">替代成本</text>
  <text x="720" y="248" text-anchor="middle" font-size="13" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif">换工具的学习成本</text>
  <rect x="860" y="190" width="260" height="80" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="990" y="222" text-anchor="middle" font-size="16" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-weight="700">人工复核必要</text>
  <text x="990" y="248" text-anchor="middle" font-size="13" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif">AI vs 人工判断</text>
  <!-- AI tool categories -->
  <text x="80" y="320" font-size="18" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="700">常见 AI 工具类型与适用场景</text>
  <rect x="80" y="340" width="180" height="70" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="170" y="368" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-weight="700">文案生成</text>
  <text x="170" y="392" text-anchor="middle" font-size="12" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif">Listing·广告</text>
  <rect x="280" y="340" width="180" height="70" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="370" y="368" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-weight="700">图片生成</text>
  <text x="370" y="392" text-anchor="middle" font-size="12" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif">A+·广告图</text>
  <rect x="480" y="340" width="180" height="70" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="570" y="368" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-weight="700">数据分析</text>
  <text x="570" y="392" text-anchor="middle" font-size="12" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif">报表·选品</text>
  <rect x="680" y="340" width="180" height="70" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="770" y="368" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-weight="700">ChatBot</text>
  <text x="770" y="392" text-anchor="middle" font-size="12" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif">通用问答</text>
  <rect x="880" y="340" width="180" height="70" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="970" y="368" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-weight="700">自动化流</text>
  <text x="970" y="392" text-anchor="middle" font-size="12" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif">操作提效</text>
  <!-- Warning -->
  <rect x="80" y="440" width="1040" height="50" rx="14" fill="#FEE2E2"/>
  <text x="600" y="472" text-anchor="middle" font-size="15" fill="#DC2626" font-family="system-ui, -apple-system, sans-serif" font-weight="700">警惕 5 类不适合场景：缺乏判断基准 · 影响账号安全 · 替代人工决策 · 法律税务 · 依赖 API</text>
  <!-- Bottom -->
  <rect x="340" y="520" width="520" height="48" rx="14" fill="#475569"/>
  <text x="600" y="552" text-anchor="middle" font-size="17" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">AI 辅助判断 + 人工经验校准 = 最佳决策</text>
</svg>