<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-mse" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#F8FAFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-mse)"/>
  <circle cx="1100" cy="80" r="160" fill="#E0E7FF" opacity="0.5"/>
  <circle cx="100" cy="580" r="180" fill="#EEF2FF" opacity="0.4"/>
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">市场容量判断</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif">搜索量聚合 + Top 100 销量推算 + 价格带分布</text>
  <!-- 3 pillar metrics -->
  <rect x="80" y="170" width="320" height="160" rx="16" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2"/>
  <circle cx="240" cy="200" r="24" fill="#6366F1"/>
  <text x="240" y="207" text-anchor="middle" font-size="18" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">1</text>
  <text x="240" y="245" text-anchor="middle" font-size="18" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">搜索量聚合</text>
  <text x="240" y="275" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">核心词 + 长尾词搜索量</text>
  <text x="240" y="298" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">月度趋势判断</text>
  <text x="240" y="318" text-anchor="middle" font-size="13" fill="#6366F1" font-family="system-ui, -apple-system, sans-serif" font-weight="600">需求天花板</text>
  <rect x="440" y="170" width="320" height="160" rx="16" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2"/>
  <circle cx="600" cy="200" r="24" fill="#6366F1"/>
  <text x="600" y="207" text-anchor="middle" font-size="18" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">2</text>
  <text x="600" y="245" text-anchor="middle" font-size="18" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">Top 100 销量推算</text>
  <text x="600" y="275" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">月销量 × 价格带估算</text>
  <text x="600" y="298" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">头部集中度分析</text>
  <text x="600" y="318" text-anchor="middle" font-size="13" fill="#6366F1" font-family="system-ui, -apple-system, sans-serif" font-weight="600">品类空间</text>
  <rect x="800" y="170" width="320" height="160" rx="16" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2"/>
  <circle cx="960" cy="200" r="24" fill="#6366F1"/>
  <text x="960" y="207" text-anchor="middle" font-size="18" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">3</text>
  <text x="960" y="245" text-anchor="middle" font-size="18" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">价格带分布</text>
  <text x="960" y="275" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">竞品价格区间统计</text>
  <text x="960" y="298" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">利润空间估算</text>
  <text x="960" y="318" text-anchor="middle" font-size="13" fill="#6366F1" font-family="system-ui, -apple-system, sans-serif" font-weight="600">定价空间</text>
  <!-- Decision funnel -->
  <rect x="80" y="370" width="1040" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="120" y="350" width="170" height="50" rx="25" fill="#6366F1"/>
  <text x="205" y="382" text-anchor="middle" font-size="15" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">收集数据</text>
  <rect x="360" y="350" width="170" height="50" rx="25" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
  <text x="445" y="382" text-anchor="middle" font-size="15" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">三数字判断</text>
  <rect x="600" y="350" width="170" height="50" rx="25" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
  <text x="685" y="382" text-anchor="middle" font-size="15" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">竞品矩阵</text>
  <rect x="840" y="350" width="170" height="50" rx="25" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
  <text x="925" y="382" text-anchor="middle" font-size="15" fill="#4338CA" font-family="system-ui, -apple-system, sans-serif" font-weight="700">选品决策</text>
  <!-- Result -->
  <rect x="340" y="440" width="520" height="56" rx="16" fill="#4338CA"/>
  <text x="600" y="476" text-anchor="middle" font-size="20" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">三数字判断 → 品类空间 → 选品决策</text>
</svg>