<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-pd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0F9FF"/>
      <stop offset="1" stop-color="#FAFFFE"/>
    </linearGradient>
    <linearGradient id="accent-pd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0E7490"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-pd)"/>
  <circle cx="150" cy="100" r="160" fill="#CFFAFE" opacity="0.5"/>
  <circle cx="1050" cy="550" r="180" fill="#F0F9FF" opacity="0.4"/>
  <!-- Title -->
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">AI 提示词判断差异化机会</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif">价格 · 场景 · 痛点 · 表达</text>
  <!-- Left: competitor matrix -->
  <rect x="80" y="155" width="340" height="36" rx="6" fill="#0E7490"/>
  <text x="250" y="179" text-anchor="middle" font-size="14" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700">竞品矩阵坐标图</text>
  <!-- Axis -->
  <line x1="120" y1="280" x2="380" y2="280" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="250" y1="200" x2="250" y2="360" stroke="#CBD5E1" stroke-width="2"/>
  <text x="260" y="195" font-size="11" fill="#94A3B8" font-family="system-ui, sans-serif">高价</text>
  <text x="260" y="380" font-size="11" fill="#94A3B8" font-family="system-ui, sans-serif">低价</text>
  <text x="110" y="295" font-size="11" fill="#94A3B8" font-family="system-ui, sans-serif">少卖点</text>
  <text x="360" y="295" font-size="11" fill="#94A3B8" font-family="system-ui, sans-serif">多卖点</text>
  <!-- Product dots -->
  <circle cx="180" cy="240" r="28" fill="#E0E7FF" stroke="#6366F1" stroke-width="2"/>
  <text x="180" y="245" text-anchor="middle" font-size="10" fill="#4338CA" font-family="system-ui, sans-serif" font-weight="700">A</text>
  <circle cx="300" cy="310" r="28" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="300" y="315" text-anchor="middle" font-size="10" fill="#059669" font-family="system-ui, sans-serif" font-weight="700">B</text>
  <circle cx="340" cy="230" r="28" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="340" y="235" text-anchor="middle" font-size="10" fill="#D97706" font-family="system-ui, sans-serif" font-weight="700">C</text>
  <!-- Opportunity area -->
  <rect x="130" y="280" width="100" height="60" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="180" y="315" text-anchor="middle" font-size="11" fill="#EF4444" font-family="system-ui, sans-serif" font-weight="700">机会区域</text>
  <!-- Arrow -->
  <path d="M425 280 L480 280" stroke="#0E7490" stroke-width="3" stroke-linecap="round"/>
  <polygon points="475,272 490,280 475,288" fill="#0E7490"/>
  <!-- Center: AI analysis -->
  <rect x="495" y="160" width="300" height="340" rx="14" fill="#FFFFFF" stroke="#06B6D4" stroke-width="2"/>
  <rect x="495" y="160" width="300" height="40" rx="14" fill="#0E7490"/>
  <text x="645" y="185" text-anchor="middle" font-size="15" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700">AI 差异分析</text>
  <text x="520" y="230" font-size="14" fill="#0E7490" font-family="system-ui, sans-serif" font-weight="700">竞品维度拆解：</text>
  <text x="520" y="258" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✓ 价格带 · 人群定位</text>
  <text x="520" y="286" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✓ 卖点结构 · 表达风格</text>
  <text x="520" y="314" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✓ Review 好评差评归因</text>
  <text x="520" y="354" font-size="14" fill="#0E7490" font-family="system-ui, sans-serif" font-weight="700">差异化方向：</text>
  <text x="520" y="382" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✅ 价格空白带</text>
  <text x="520" y="410" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✅ 场景差异化</text>
  <text x="520" y="438" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✅ 痛点解决方向</text>
  <text x="520" y="478" font-size="13" fill="#D97706" font-family="system-ui, sans-serif" font-weight="600">⚠ 建议复核：需求是否真实</text>
  <!-- Right: result labels -->
  <rect x="830" y="180" width="290" height="56" rx="28" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="975" y="214" text-anchor="middle" font-size="16" fill="#059669" font-family="system-ui, sans-serif" font-weight="700">价格差异化</text>
  <rect x="830" y="255" width="290" height="56" rx="28" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="975" y="289" text-anchor="middle" font-size="16" fill="#4338CA" font-family="system-ui, sans-serif" font-weight="700">场景差异化</text>
  <rect x="830" y="330" width="290" height="56" rx="28" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="975" y="364" text-anchor="middle" font-size="16" fill="#D97706" font-family="system-ui, sans-serif" font-weight="700">痛点差异化</text>
  <rect x="830" y="405" width="290" height="56" rx="28" fill="#FFE4E6" stroke="#FB7185" stroke-width="1.5"/>
  <text x="975" y="439" text-anchor="middle" font-size="16" fill="#BE123C" font-family="system-ui, sans-serif" font-weight="700">表达差异化</text>
  <!-- Bottom CTA -->
  <rect x="300" y="560" width="600" height="50" rx="16" fill="url(#accent-pd)"/>
  <text x="600" y="592" text-anchor="middle" font-size="18" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">拆竞品 → 找差异 → 判断机会</text>
</svg>
