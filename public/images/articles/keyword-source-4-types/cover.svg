<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-ks4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0F9FF"/>
      <stop offset="1" stop-color="#F8FAFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-ks4)"/>
  <circle cx="200" cy="100" r="150" fill="#E0F2FE" opacity="0.4"/>
  <circle cx="1050" cy="550" r="180" fill="#F0F9FF" opacity="0.5"/>
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">关键词 4 类来源</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-family="system-ui, -apple-system, sans-serif">不只从工具来·4 个渠道全覆盖</text>
  <!-- 4 quadrants -->
  <!-- Competitor Listing -->
  <rect x="80" y="170" width="240" height="160" rx="16" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <circle cx="200" cy="200" r="24" fill="#DBEAFE"/>
  <text x="200" y="207" text-anchor="middle" font-size="18" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="700">1</text>
  <text x="200" y="240" text-anchor="middle" font-size="18" fill="#1E40AF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">竞品 Listing</text>
  <text x="200" y="265" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">标题·五点·A+</text>
  <text x="200" y="285" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">反向 ASIN 查词</text>
  <text x="200" y="305" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">Bullet Point 提取</text>
  <!-- Ads Reports -->
  <rect x="340" y="170" width="240" height="160" rx="16" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <circle cx="460" cy="200" r="24" fill="#DBEAFE"/>
  <text x="460" y="207" text-anchor="middle" font-size="18" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="700">2</text>
  <text x="460" y="240" text-anchor="middle" font-size="18" fill="#1E40AF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">广告报告</text>
  <text x="460" y="265" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">搜索词报告</text>
  <text x="460" y="285" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">自动广告投放词</text>
  <text x="460" y="305" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">ABA 品牌分析</text>
  <!-- Reviews -->
  <rect x="80" y="360" width="240" height="160" rx="16" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <circle cx="200" cy="390" r="24" fill="#DBEAFE"/>
  <text x="200" y="397" text-anchor="middle" font-size="18" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="700">3</text>
  <text x="200" y="430" text-anchor="middle" font-size="18" fill="#1E40AF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">商品评价</text>
  <text x="200" y="455" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">好评·差评·中评</text>
  <text x="200" y="475" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">Q&A 用户提问</text>
  <text x="200" y="495" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">高频场景词</text>
  <!-- External -->
  <rect x="340" y="360" width="240" height="160" rx="16" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <circle cx="460" cy="390" r="24" fill="#DBEAFE"/>
  <text x="460" y="397" text-anchor="middle" font-size="18" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="700">4</text>
  <text x="460" y="430" text-anchor="middle" font-size="18" fill="#1E40AF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">平台外渠道</text>
  <text x="460" y="455" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">Google Trends</text>
  <text x="460" y="475" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">社交媒体话题</text>
  <text x="460" y="495" text-anchor="middle" font-size="14" fill="#475569" font-family="system-ui, -apple-system, sans-serif">竞品官网关键词</text>
  <!-- Center label -->
  <rect x="315" y="260" width="250" height="50" rx="25" fill="#2563EB"/>
  <text x="440" y="293" text-anchor="middle" font-size="18" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">4 类来源互补覆盖</text>
  <!-- Tags at bottom -->
  <rect x="680" y="200" width="180" height="44" rx="22" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="770" y="228" text-anchor="middle" font-size="15" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="600">工具导出 ≠ 全部</text>
  <rect x="680" y="260" width="180" height="44" rx="22" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="770" y="288" text-anchor="middle" font-size="15" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="600">用户语言 > 工具数据</text>
  <rect x="680" y="320" width="180" height="44" rx="22" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="770" y="348" text-anchor="middle" font-size="15" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="600">竞品词 = 对标词库</text>
  <rect x="680" y="380" width="180" height="44" rx="22" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="770" y="408" text-anchor="middle" font-size="15" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="600">评价词 = 场景词</text>
  <!-- Step indicator -->
  <rect x="80" y="560" width="1040" height="4" rx="2" fill="#E2E8F0"/>
  <circle cx="130" cy="562" r="8" fill="#2563EB"/><text x="130" y="590" text-anchor="middle" font-size="13" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-weight="600">找来源</text>
  <circle cx="360" cy="562" r="8" fill="#CBD5E1"/><text x="360" y="590" text-anchor="middle" font-size="13" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif">清洗</text>
  <circle cx="600" cy="562" r="8" fill="#CBD5E1"/><text x="600" y="590" text-anchor="middle" font-size="13" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif">判断</text>
  <circle cx="840" cy="562" r="8" fill="#CBD5E1"/><text x="840" y="590" text-anchor="middle" font-size="13" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif">布局</text>
  <circle cx="1070" cy="562" r="8" fill="#CBD5E1"/><text x="1070" y="590" text-anchor="middle" font-size="13" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif">复盘</text>
</svg>