<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-wr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0FDF4"/>
      <stop offset="1" stop-color="#FAFFFB"/>
    </linearGradient>
    <linearGradient id="accent-wr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#047857"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-wr)"/>
  <circle cx="150" cy="100" r="160" fill="#D1FAE5" opacity="0.5"/>
  <circle cx="1050" cy="550" r="180" fill="#F0FDF4" opacity="0.4"/>
  <!-- Title -->
  <text x="80" y="80" font-size="36" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-weight="800">AI 提示词写运营周复盘</text>
  <text x="80" y="120" font-size="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif">销量 · 广告 · Review · 库存 → 下周动作</text>
  <!-- Left: KPI cards -->
  <rect x="80" y="155" width="160" height="70" rx="10" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="160" y="180" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, sans-serif">本周销量</text>
  <text x="160" y="210" text-anchor="middle" font-size="22" fill="#047857" font-family="system-ui, sans-serif" font-weight="700">142</text>
  <rect x="255" y="155" width="160" height="70" rx="10" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="335" y="180" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, sans-serif">广告花费</text>
  <text x="335" y="210" text-anchor="middle" font-size="22" fill="#047857" font-family="system-ui, sans-serif" font-weight="700">$1,280</text>
  <rect x="80" y="240" width="160" height="70" rx="10" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="160" y="265" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, sans-serif">ACOS</text>
  <text x="160" y="295" text-anchor="middle" font-size="22" fill="#F59E0B" font-family="system-ui, sans-serif" font-weight="700">32%</text>
  <rect x="255" y="240" width="160" height="70" rx="10" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="335" y="265" text-anchor="middle" font-size="13" fill="#475569" font-family="system-ui, sans-serif">Review</text>
  <text x="335" y="295" text-anchor="middle" font-size="22" fill="#047857" font-family="system-ui, sans-serif" font-weight="700">+3</text>
  <!-- Simple line chart -->
  <rect x="80" y="330" width="335" height="120" rx="10" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="95" y="355" font-size="13" fill="#475569" font-family="system-ui, sans-serif" font-weight="600">销量趋势（周）</text>
  <polyline points="110,430 140,410 170,415 200,385 230,390 260,360 290,370" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  <circle cx="290" cy="370" r="5" fill="#10B981"/>
  <!-- Arrow -->
  <path d="M420 300 L475 300" stroke="#047857" stroke-width="3" stroke-linecap="round"/>
  <polygon points="470,292 485,300 470,308" fill="#047857"/>
  <!-- Center: AI analysis -->
  <rect x="490" y="160" width="310" height="340" rx="14" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <rect x="490" y="160" width="310" height="40" rx="14" fill="#047857"/>
  <text x="645" y="185" text-anchor="middle" font-size="15" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700">AI 复盘总结</text>
  <text x="515" y="230" font-size="14" fill="#047857" font-family="system-ui, sans-serif" font-weight="700">本周核心发现：</text>
  <text x="515" y="258" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✓ 销量上升但 ACOS 偏高</text>
  <text x="515" y="286" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✓ 差评集中在外包装</text>
  <text x="515" y="314" font-size="13" fill="#475569" font-family="system-ui, sans-serif">✓ 库存周转下降</text>
  <text x="515" y="354" font-size="14" fill="#047857" font-family="system-ui, sans-serif" font-weight="700">下周重点动作：</text>
  <text x="515" y="382" font-size="13" fill="#475569" font-family="system-ui, sans-serif">① 优化高 ACOS 广告组</text>
  <text x="515" y="410" font-size="13" fill="#475569" font-family="system-ui, sans-serif">② 补充 A+ 包装说明</text>
  <text x="515" y="438" font-size="13" fill="#475569" font-family="system-ui, sans-serif">③ 调整补货节奏</text>
  <text x="515" y="478" font-size="13" fill="#D97706" font-family="system-ui, sans-serif" font-weight="600">⚠ 不要只看数据·要归因</text>
  <!-- Right: next week checklist -->
  <rect x="835" y="180" width="285" height="56" rx="28" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="977" y="214" text-anchor="middle" font-size="16" fill="#059669" font-family="system-ui, sans-serif" font-weight="700">广告结构优化</text>
  <rect x="835" y="255" width="285" height="56" rx="28" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="977" y="289" text-anchor="middle" font-size="16" fill="#4338CA" font-family="system-ui, sans-serif" font-weight="700">差评归因修复</text>
  <rect x="835" y="330" width="285" height="56" rx="28" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="977" y="364" text-anchor="middle" font-size="16" fill="#D97706" font-family="system-ui, sans-serif" font-weight="700">库存补货计划</text>
  <rect x="835" y="405" width="285" height="56" rx="28" fill="#FFE4E6" stroke="#FB7185" stroke-width="1.5"/>
  <text x="977" y="439" text-anchor="middle" font-size="16" fill="#BE123C" font-family="system-ui, sans-serif" font-weight="700">竞品新动向监测</text>
  <!-- Bottom CTA -->
  <rect x="300" y="560" width="600" height="50" rx="16" fill="url(#accent-wr)"/>
  <text x="600" y="592" text-anchor="middle" font-size="18" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">数据 → AI 分析 → 归因 → 下周动作</text>
</svg>
