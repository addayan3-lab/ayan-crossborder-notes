      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#FCFCFD"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-prb)"/>
  <circle cx="1050" cy="80" r="160" fill="#E2E8F0" opacity="0.4"/>
