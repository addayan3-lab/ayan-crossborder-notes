  <rect x="340" y="450" width="520" height="56" rx="16" fill="#475569"/>
  <text x="600" y="486" text-anchor="middle" font-size="20" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="700">发版前检查 → 运营中持续监控 → 安全运营</text>
