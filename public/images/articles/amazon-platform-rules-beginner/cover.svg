  <text x="865" y="220" font-size="13" fill="#64748B" font-family="system-ui, -apple-system, sans-serif">合规索评·禁止诱导·禁止换卡</text>
  <rect x="80" y="260" width="320" height="65" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
