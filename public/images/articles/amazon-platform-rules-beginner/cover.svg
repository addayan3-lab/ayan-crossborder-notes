  <rect x="800" y="260" width="320" height="65" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="830" cy="292" r="14" fill="#F1F5F9" stroke="#94A3B8"/><text x="830" y="297" text-anchor="middle" font-size="14" fill="#64748B" font-weight="700">6</text>
  <text x="865" y="288" font-size="16" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-weight="700">品牌 &amp; 备案</text>
  <text x="865" y="310" font-size="13" fill="#64748B" font-family="system-ui, -apple-system, sans-serif">品牌滥用·备案失败·授权问题</text>
